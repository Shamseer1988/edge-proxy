# =============================================================================
# Edge proxy — Proxmox LXC build (stock Debian nginx, NOT the Docker image).
#
# Deploy on the edge-nginx CT:
#   cp lxc/nginx.conf      /etc/nginx/conf.d/default.conf
#   cp snippets/*          /etc/nginx/snippets/
#   # drop the Cloudflare Origin Cert into /etc/nginx/ssl/{origin.crt,origin.key}
#   nginx -t && systemctl reload nginx
#
# Why this differs from the repo-root nginx.conf (which targets nginx:1.27 in
# Docker):
#   * Upstreams are STATIC CT IPs, not Docker DNS aliases. An IP needs no
#     resolution, so nginx ALWAYS boots even when an app CT is down — that one
#     vhost returns 502 while every other site keeps serving. This is the
#     "one site down must not take the others down" guarantee.
#   * HTTP/2 is enabled the 1.22-compatible way (`listen ... ssl http2`).
#     Debian 12 ships nginx 1.22; the `http2 on;` directive is 1.25.1+ and
#     errors with `unknown directive "http2"` on 1.22.
#   * No `gzip on;` here — Debian's /etc/nginx/nginx.conf already sets it, and
#     repeating it is a duplicate-directive emerg.
# =============================================================================

# Real client IP arrives via CF-Connecting-IP from the cloudflared CT on the LAN.
set_real_ip_from 192.168.100.0/24;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# `gzip on;` is already enabled in Debian's main nginx.conf — do NOT repeat it.
gzip_types text/plain application/json application/javascript text/css image/svg+xml application/xml;
gzip_min_length 1024;

# -----------------------------------------------------------------------------
# Upstreams = static CT IPs. Resilient by construction: a down CT only 502s its
# own vhost; nginx still boots and serves the others. Adjust IPs/ports to match
# your CTs.
#   corporate (pugweb)  192.168.100.51 : 3000 web / 8000 api
#   housing             192.168.100.52 : 3000 web / 5000 api
#   finance (pugfin)    192.168.100.53 : 5000
#   zeroone (teekey)    192.168.100.54 : 3000 web / 8000 api
#   legal               192.168.100.55 : 3000 web / 8000 api
# -----------------------------------------------------------------------------
upstream pugweb_frontend  { server 192.168.100.51:3000; keepalive 32; }
upstream pugweb_api       { server 192.168.100.51:8000; keepalive 32; }
upstream housing_frontend { server 192.168.100.52:3000; keepalive 32; }
upstream housing_backend  { server 192.168.100.52:5000; keepalive 32; }
upstream pugfin_app       { server 192.168.100.53:5000; keepalive 32; }
upstream zeroone_frontend { server 192.168.100.54:3000; keepalive 32; }
upstream zeroone_api      { server 192.168.100.54:8000; keepalive 32; }
upstream legal_frontend   { server 192.168.100.55:3000; keepalive 32; }
upstream legal_api        { server 192.168.100.55:8000; keepalive 32; }

# ---- 80 -> 443 for every hostname ----
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name accommodation.parisunitedgroup.com pugfin.parisunitedgroup.com parisunitedgroup.com www.parisunitedgroup.com;
    return 301 https://$host$request_uri;
}

# ---- default 443: close unknown SNI ----
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;
    include /etc/nginx/snippets/ssl-common.conf;
    return 444;
}

# ---- Host 1: accommodation -> housing CT (.52) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name accommodation.parisunitedgroup.com;
    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 30M;

    location = /health { proxy_pass http://housing_backend/api/v1/health; access_log off; }
    location /api/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_buffering off; proxy_cache off; proxy_read_timeout 1h;
        proxy_pass http://housing_backend;
    }
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://housing_frontend; proxy_read_timeout 60s;
    }
}

# ---- Host 2: pugfin -> finance CT (.53, single Flask app) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pugfin.parisunitedgroup.com;
    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 30M;

    location = /health { access_log off; default_type text/plain; return 200 "ok\n"; }
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://pugfin_app; proxy_read_timeout 120s;
    }
}

# ---- Host 3: corporate -> pugweb CT (.51). The app emits its own CSP. ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name parisunitedgroup.com www.parisunitedgroup.com;
    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 20M;

    if ($host = www.parisunitedgroup.com) { return 301 https://parisunitedgroup.com$request_uri; }

    location = /health { access_log off; default_type text/plain; return 200 "ok\n"; }
    location /api/v1/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_buffering off; proxy_cache off; proxy_read_timeout 1h;
        proxy_pass http://pugweb_api;
    }
    location /_next/static/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://pugweb_frontend;
        expires 30d; add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://pugweb_frontend; proxy_read_timeout 60s;
    }
}

# ---- Host 4a: teekeyhospitality.com + www -> FRONTEND (CT .54:3000, React/CRA zfe) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teekeyhospitality.com www.teekeyhospitality.com;

    # teekeyhospitality.com origin cert (covers apex + *.teekeyhospitality.com)
    ssl_certificate     /etc/nginx/ssl/teekey-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/teekey-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 20M;

    # www -> apex (apex is canonical)
    if ($host = www.teekeyhospitality.com) { return 301 https://teekeyhospitality.com$request_uri; }

    location = /health { access_log off; default_type text/plain; return 200 "ok\n"; }
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://zeroone_frontend; proxy_read_timeout 60s;
    }
}

# ---- Host 4b: zeroone.teekeyhospitality.com -> BACKEND API (CT .54:8000, FastAPI zbe) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zeroone.teekeyhospitality.com;

    ssl_certificate     /etc/nginx/ssl/teekey-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/teekey-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 20M;

    location = /health { access_log off; default_type text/plain; return 200 "ok\n"; }
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_buffering off; proxy_cache off; proxy_read_timeout 1h;
        proxy_pass http://zeroone_api;
    }
}

# ---- Host 5: legal.parisunitedgroup.com -> Legal Case CT (.55) ----
#   Next.js front (:3000) + FastAPI back (:8000, /api/v1). A SUBDOMAIN of
#   parisunitedgroup.com, so the existing PUG origin cert already covers it —
#   ssl-common.conf, no new cert, and the tunnel keeps No-TLS-Verify OFF. The
#   SPA calls the API cross-origin at this same host, so the app's CORS_ORIGINS
#   must list https://legal.parisunitedgroup.com.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name legal.parisunitedgroup.com;
    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 50M;

    location = /health { access_log off; default_type text/plain; return 200 "ok\n"; }
    location /api/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_buffering off; proxy_cache off; proxy_read_timeout 1h;
        proxy_pass http://legal_api;
    }
    location /_next/static/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://legal_frontend;
        expires 30d; add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://legal_frontend; proxy_read_timeout 60s;
    }
}
