# =============================================================================
# Standalone edge proxy — Cloudflare Full (Strict) origin.
#
# Hosts terminated on this box:
#   accommodation.parisunitedgroup.com  → Employee Housing Control Portal
#   pugfin.parisunitedgroup.com         → PUG Finance app          (planned)
#   parisunitedgroup.com / www.         → PUG corporate site       (planned)
#
# Upstream targets live in app-specific compose stacks that join the
# same `pug_edge` external network we're on. Each app exposes its
# HTTP service under a stable alias (housing-backend, housing-frontend,
# pugfin-backend, …) — that's what the upstream blocks below address.
# =============================================================================

# -----------------------------------------------------------------------------
# Real-client-IP — trust the Cloudflare edge ranges only.
#
# Keep these in sync with:
#     https://www.cloudflare.com/ips-v4
#     https://www.cloudflare.com/ips-v6
# -----------------------------------------------------------------------------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# -----------------------------------------------------------------------------
# Hard allowlist on $realip_remote_addr (the ORIGINAL connecting peer,
# not the post-realip-rewritten end-user IP). Bypass attempts on the
# static public IP get a 403 inside each vhost.
# -----------------------------------------------------------------------------
geo $realip_remote_addr $cf_edge {
    default 0;
    173.245.48.0/20    1;
    103.21.244.0/22    1;
    103.22.200.0/22    1;
    103.31.4.0/22      1;
    141.101.64.0/18    1;
    108.162.192.0/18   1;
    190.93.240.0/20    1;
    188.114.96.0/20    1;
    197.234.240.0/22   1;
    198.41.128.0/17    1;
    162.158.0.0/15     1;
    104.16.0.0/13      1;
    104.24.0.0/14      1;
    172.64.0.0/13      1;
    131.0.72.0/22      1;
    2400:cb00::/32     1;
    2606:4700::/32     1;
    2803:f800::/32     1;
    2405:b500::/32     1;
    2405:8100::/32     1;
    2a06:98c0::/29     1;
    2c0f:f248::/32     1;
    # Loopback for docker healthcheck + Tunnel sidecar if used.
    127.0.0.1/32       1;
    # Docker bridge / compose internal networks.
    172.16.0.0/12      1;
    10.0.0.0/8         1;
}

# Shared SSL session cache + global gzip.
ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

gzip on;
gzip_types text/plain application/json application/javascript text/css image/svg+xml application/xml;
gzip_min_length 1024;

# -----------------------------------------------------------------------------
# Upstreams. Each name resolves over the pug_edge bridge to the
# matching app stack's exposed service alias.
# -----------------------------------------------------------------------------
upstream housing_backend {
    server housing-backend:5000;
    keepalive 32;
}
upstream housing_frontend {
    server housing-frontend:3000;
    keepalive 32;
}

# Host #2 — PUG Finance app (planned). Uncomment together with the
# corresponding compose stack's services and the host #2 server block
# at the bottom of this file.
# upstream pugfin_backend {
#     server pugfin-backend:5000;
#     keepalive 32;
# }
# upstream pugfin_frontend {
#     server pugfin-frontend:3000;
#     keepalive 32;
# }

# Host #3 — PUG corporate marketing site (planned).
# upstream pugweb_api {
#     server pugweb-api:8000;
#     keepalive 32;
# }
# upstream pugweb_frontend {
#     server pugweb-frontend:3000;
#     keepalive 32;
# }

# -----------------------------------------------------------------------------
# 80 → 301 https for every live hostname.
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name accommodation.parisunitedgroup.com;
    #            pugfin.parisunitedgroup.com
    #            parisunitedgroup.com
    #            www.parisunitedgroup.com;
    return 301 https://$host$request_uri;
}

# -----------------------------------------------------------------------------
# Default 443 — close the connection on unknown SNI (444).
# -----------------------------------------------------------------------------
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    # TLS context must load even on a reject server, otherwise the
    # handshake fails before we can `return 444`.
    include /etc/nginx/snippets/ssl-common.conf;

    return 444;
}

# =============================================================================
# Host #1 — accommodation.parisunitedgroup.com (Employee Housing Portal).
# Upstream lives in the housing compose stack at C:\Apps\Employee-Housing-Control-Portal
# (joined to pug_edge with the aliases housing-backend / housing-frontend).
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name accommodation.parisunitedgroup.com;

    if ($cf_edge = 0) {
        return 403;
    }

    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    client_max_body_size 30M;

    # Health probe (public, unauthenticated).
    location = /health {
        proxy_pass http://housing_backend/api/v1/health;
        access_log off;
    }

    # Attachment downloads — force the browser to download.
    location ~ ^/api/v1/attachments/[0-9]+/download$ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://housing_backend;
        proxy_read_timeout 120s;

        proxy_hide_header Content-Disposition;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Backend API — SSE-aware (no buffering, long read timeout).
    location /api/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_pass http://housing_backend;
    }

    # Next.js frontend (catch-all).
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://housing_frontend;
        proxy_read_timeout 60s;
    }
}

