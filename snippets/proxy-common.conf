# Common proxy headers — included from each `location` that proxies to
# an upstream over pug_edge. Host passes through unchanged so the
# upstream sees its own server_name (cookie domain, CSRF allowed-host
# checks, etc.). X-Forwarded-Proto is hard-coded https because we
# terminate TLS here. Connection "" + HTTP/1.1 enables upstream
# keepalive against the upstream block's `keepalive 32;` directive.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_http_version 1.1;
proxy_set_header Connection "";
